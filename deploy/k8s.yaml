apiVersion: apps/v1
kind: Deployment
metadata: { name: timeliner, labels: { app: timeliner } }
spec:
  replicas: 1
  selector: { matchLabels: { app: timeliner } }
  template:
    metadata: { labels: { app: timeliner } }
    spec:
      containers:
        - name: timeliner
          image: ghcr.io/cognis-digital/timeliner:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: timeliner }
spec:
  selector: { app: timeliner }
  ports: [{ port: 80, targetPort: 8000 }]
